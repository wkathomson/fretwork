/* ============================================================= *
 *  Fretwork – single-file acoustic guitar reference & curriculum
 * ============================================================= */
:root{
  --bg:#fef4f5;
  --bg2:#ffffff;
  --panel:#ffffff;
  --panel2:#ffe7ec;
  --line:#fad9e0;
  --ink:#2a2230;
  --ink-dim:#7f6e75;
  --ink-faint:#bba4ac;
  --muted:#7f6e75;
  --wood:#ff3d6e;        /* vibrant hot coral pink – primary fill */
  --wood-lite:#ff7196;
  --accent:#f01f5e;      /* hot coral pink, readable on white */
  --accent-2:#13a99a;    /* teal – scale notes / secondary */
  --root:#f01f5e;        /* scale root = coral pink */
  --good:#2fae6b;
  --shadow:0 8px 26px rgba(240,31,94,.13);
  --r:16px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font:16px/1.55 "Nunito",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,.logo,.metro-bpm{font-family:"Baloo 2",ui-rounded,"SF Pro Rounded",-apple-system,system-ui,sans-serif}
h1,h2,h3,h4{font-weight:680;line-height:1.25;margin:0 0 .5em;letter-spacing:-.01em}
h2{font-size:1.4rem}
h3{font-size:1.12rem;color:var(--ink)}
h4{font-size:1rem;color:var(--accent)}
p{margin:0 0 .9em}
a{color:var(--accent)}
small{color:var(--ink-dim)}
button{font-family:inherit;cursor:pointer}

/* App frame ---------------------------------------------------- */
#app{display:flex;flex-direction:column;height:100%}
header{
  display:flex;align-items:center;gap:10px;
  padding:calc(var(--safe-t) + 10px) 16px 10px;
  background:linear-gradient(180deg,var(--bg) 60%,rgba(243,239,232,0));
  position:sticky;top:0;z-index:30;
}
header .logo{font-weight:800;letter-spacing:.5px;font-size:1.15rem;display:flex;align-items:center;gap:8px}
header .logo .mark{color:var(--accent)}
header .spacer{flex:1}
.iconbtn{
  background:var(--panel);border:1px solid var(--line);color:var(--ink);
  width:42px;height:42px;border-radius:12px;font-size:1.1rem;display:grid;place-items:center;
}
.iconbtn:active{background:var(--panel2)}

main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 16px 24px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Bottom tab bar ---------------------------------------------- */
nav#tabs{
  display:flex;background:rgba(255,255,255,.92);backdrop-filter:saturate(1.4) blur(10px);
  -webkit-backdrop-filter:saturate(1.4) blur(10px);border-top:1px solid var(--line);
  padding-bottom:var(--safe-b);position:sticky;bottom:0;z-index:30;
}
nav#tabs button{
  flex:1;background:none;border:0;color:var(--ink-dim);
  padding:8px 2px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.66rem;
}
nav#tabs button .ico{font-size:1.32rem;line-height:1}
nav#tabs button.active{color:var(--accent)}

/* Generic UI --------------------------------------------------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin:0 0 14px;box-shadow:var(--shadow)}
.card.tight{padding:12px}
.section-intro{color:var(--ink-dim);margin-bottom:14px}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px}
.pill{
  background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);
  padding:8px 14px;border-radius:999px;font-size:.85rem;font-weight:600;
}
.pill.active{background:var(--wood);border-color:var(--wood-lite);color:#1a1109}
.group-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.09em;color:var(--accent);margin:18px 2px 8px;font-weight:700}
.hint{font-size:.86rem;color:var(--ink-dim)}
.tip{background:rgba(127,183,164,.1);border-left:3px solid var(--accent-2);border-radius:8px;padding:10px 12px;margin:0 0 12px;font-size:.92rem}
.btn{background:var(--wood);color:#1a1109;border:0;border-radius:12px;padding:12px 16px;font-weight:700;font-size:.95rem}
.btn.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
.btn.block{display:block;width:100%}
.btn:active{filter:brightness(.93)}
.row{display:flex;gap:10px;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}

/* Chord / diagram tiles --------------------------------------- */
.chip{
  position:relative;background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:12px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;
}
.chip:active{background:var(--panel2);border-color:var(--wood)}
.chip .name{font-weight:750;font-size:1.02rem}
.chip .sub{font-size:.72rem;color:var(--ink-dim);text-align:center;min-height:1em;line-height:1.3}
.chip svg{width:100%;height:auto;max-width:128px}
.chip .chip-play{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:50%;
  background:var(--panel2);border:1px solid var(--line);color:var(--accent);font-size:.8rem;display:grid;place-items:center}
.chip .chip-play:active{background:var(--wood);color:#fff}
.chip .zoomhint{position:absolute;top:10px;left:10px;color:var(--ink-faint);font-size:.85rem}
.chip .chip-add{position:absolute;top:8px;left:8px;width:34px;height:34px;border-radius:50%;
  background:var(--panel2);border:1px solid var(--line);color:var(--accent);font-size:1.2rem;font-weight:800;line-height:1;display:grid;place-items:center}
.chip .chip-add:active{background:var(--wood);color:#fff}
.diagram-svg{display:block}

/* Progression builder */
.prog-panel{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:18px;padding:14px;margin:0 0 16px;box-shadow:var(--shadow)}
.prog-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.prog-head h3{margin:0}
.prog-head .count{font-size:.74rem;color:var(--ink-dim);font-weight:700}
.prog-empty{font-size:.9rem;color:var(--ink-dim);margin-bottom:10px}
.prog-strip{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:8px 2px 10px}
.prog-item{position:relative;flex:0 0 auto;width:100px;background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:8px 6px 6px;text-align:center;transition:transform .12s,border-color .12s,box-shadow .12s}
.prog-item .pname{font-family:"Baloo 2",ui-rounded,sans-serif;font-weight:800;font-size:.95rem;margin-bottom:2px}
.prog-item svg{max-width:84px;margin:0 auto}
.prog-item .prog-num{position:absolute;top:4px;left:7px;font-size:.62rem;color:var(--ink-faint);font-weight:800}
.prog-item .px{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;border:2px solid var(--panel);font-size:.62rem;display:grid;place-items:center;line-height:1}
.prog-item.playing{border-color:var(--wood);transform:translateY(-3px) scale(1.05);box-shadow:0 8px 18px rgba(240,31,94,.28)}
.prog-now{font-family:"Baloo 2",ui-rounded,sans-serif;font-weight:800;font-size:1.25rem;text-align:center;min-height:1.4em;color:var(--accent)}
.prog-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px}
.prog-controls .btn{padding:11px 16px;font-size:.9rem}
.seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{background:var(--panel);border:0;color:var(--ink-dim);padding:9px 12px;font-weight:700;font-size:.8rem}
.seg button.on{background:var(--wood);color:#fff}
.prog-tempo{display:flex;align-items:center;gap:10px;margin-top:12px}
.prog-tempo .hint{min-width:64px;font-weight:700}
.prog-tempo input{flex:1}

/* Streak + practice games */
.streak-card{display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(110deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin:0 0 12px;box-shadow:var(--shadow)}
.streak-big{font-family:"Baloo 2",ui-rounded,sans-serif;font-weight:800;font-size:1.25rem}
.streak-big b{color:var(--accent);font-size:1.5rem}
.streak-sub{font-size:.8rem;color:var(--ink-dim);text-align:right;flex:1}
.choice-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.btn.choice{padding:14px;font-size:1rem}
.choice:disabled{opacity:1}
.choice.right{background:var(--good)!important;color:#fff!important;border-color:var(--good)!important}
.choice.wrong{background:#eee;color:var(--ink-dim);border-color:var(--line)}
.quiz-fb{min-height:1.5em;text-align:center;margin-top:10px;font-weight:700}
.quiz-fb .ok{color:var(--good)}
.quiz-fb .no{color:var(--accent)}
#noteCard svg,#earCard svg{display:block;margin:4px auto;max-width:340px}

/* Chord zoom modal */
.zoom-card{display:flex;flex-direction:column;align-items:center;gap:6px}
.zoom-card svg{width:100%;max-width:300px;height:auto}
.zoom-card .zname{font-size:1.6rem;font-weight:750}
.finger-legend{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;font-size:.82rem;color:var(--ink-dim);margin:4px 2px 10px}
.finger-legend b{color:var(--ink)}
.howto{font-size:.86rem;color:var(--ink-dim);background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;width:100%}
.howto li{margin:2px 0}

/* scale note highlight while playing */
.snote{transition:none}
.scale-strlabel{fill:var(--ink-faint);font-size:11px}

/* Scale visualiser -------------------------------------------- */
.scale-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;background:var(--bg2);padding:10px 6px}
.scale-scroll svg{height:auto}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:.8rem;color:var(--ink-dim);margin-top:10px}
.legend i{width:13px;height:13px;border-radius:50%;display:inline-block;vertical-align:-2px;margin-right:5px}

/* Tools -------------------------------------------------------- */
.metro-display{text-align:center;padding:6px 0 2px}
.metro-bpm{font-size:3.4rem;font-weight:800;line-height:1}
.metro-bpm small{font-size:1rem;color:var(--ink-dim);font-weight:600}
.beat-row{display:flex;justify-content:center;gap:12px;margin:18px 0}
.beat{width:26px;height:26px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);transition:transform .05s,background .05s}
.beat.on{background:var(--accent);transform:scale(1.25)}
.beat.accent.on{background:var(--root)}
.slider{width:100%;accent-color:var(--wood);height:34px}
.bpm-btns{display:flex;gap:8px;justify-content:center;margin:6px 0}
.bpm-btns button{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;width:54px;height:46px;font-size:1.1rem;font-weight:700}

/* Curriculum --------------------------------------------------- */
.module{margin-bottom:14px}
.module-head{display:flex;align-items:center;gap:12px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:left;color:var(--ink)}
.module-head:active{background:var(--panel2)}
.module-head .stage{font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-2)}
.module-head .mtitle{font-weight:700;font-size:1.02rem}
.module-head .chev{margin-left:auto;color:var(--ink-dim);transition:transform .2s}
.module.open .chev{transform:rotate(90deg)}
.ring{--p:0;width:42px;height:42px;flex:0 0 42px;border-radius:50%;
  background:conic-gradient(var(--good) calc(var(--p)*1%),var(--panel2) 0);
  display:grid;place-items:center}
.ring::after{content:"";width:32px;height:32px;border-radius:50%;background:var(--panel)}
.ring span{position:absolute;font-size:.64rem;font-weight:700;color:var(--ink-dim)}
.ring.wrap{position:relative;display:grid;place-items:center}
.lessons{display:none;background:var(--panel);border:1px solid var(--line);border-top:0;border-radius:0 0 14px 14px;padding:2px 12px;margin-top:-2px}
.module.open .lessons{display:block}
.module.open .module-head{border-radius:14px 14px 0 0}
.lesson-link{display:flex;align-items:center;gap:12px;width:100%;-webkit-appearance:none;appearance:none;background:transparent;border:0;border-bottom:1px solid var(--line);padding:13px 4px;text-align:left;font-size:.95rem;color:var(--ink)}
.lesson-link:last-child{border-bottom:0}
.lesson-link:active{background:var(--panel2)}
.lesson-link .tick{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex:0 0 24px;display:grid;place-items:center;font-size:.8rem;color:transparent}
.lesson-link.done .tick{background:var(--good);border-color:var(--good);color:#0d1a0c}
.lesson-link .lt{flex:1}
.lesson-link .arrow{color:var(--ink-dim)}

/* Lesson reader ------------------------------------------------ */
#lessonView{display:none}
#lessonView.active{display:block}
.lesson-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.back{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:8px 12px;font-weight:600}
.lesson-body h3{margin-top:18px}
.lesson-body .inline-chords{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:8px 0 14px}
.lesson-body .inline-chords .chip{flex:0 0 108px}
.lesson-complete{margin:20px 0 8px}
.toggle{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
.toggle .sw{width:52px;height:30px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);position:relative;flex:0 0 52px;transition:background .2s}
.toggle .sw::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:var(--ink);transition:left .2s}
.toggle.on .sw{background:var(--good)}
.toggle.on .sw::after{left:25px;background:#0d1a0c}
.lesson-nav{display:flex;gap:10px;margin-top:18px}
.lesson-nav button{flex:1}

/* Parts diagram labels */
.parts-list{columns:2;font-size:.86rem;color:var(--ink-dim);gap:18px}
.parts-list li{margin-bottom:4px}

/* Modal -------------------------------------------------------- */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:50;align-items:flex-end}
.modal-back.open{display:flex}
.modal{position:relative;background:var(--panel);border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-height:88vh;overflow-y:auto;padding:18px 18px calc(28px + var(--safe-b));border-top:1px solid var(--line)}
.modal h3{margin-bottom:12px}
.modal-x{position:sticky;top:0;float:right;margin:-4px -4px 0 0;width:38px;height:38px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font-size:1rem;display:grid;place-items:center;z-index:2}
.modal-x:active{background:var(--wood);color:#fff;border-color:var(--wood)}
textarea.io{width:100%;min-height:120px;background:var(--bg2);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:.8rem}
.field{margin:12px 0}
.field label{display:block;font-size:.8rem;color:var(--ink-dim);margin-bottom:6px}
.toast{position:fixed;left:50%;bottom:calc(86px + var(--safe-b));transform:translateX(-50%);background:#000d;color:#fff;padding:10px 16px;border-radius:999px;font-size:.85rem;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.note-banner{font-size:.82rem;color:var(--ink-dim);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
.stringbtn{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.stringbtn:active{background:var(--panel2);border-color:var(--wood)}
.stringbtn .nm{font-weight:700;font-size:1.05rem}
.stringbtn .oct{color:var(--ink-dim);font-size:.8rem}
.stringbtn .play{color:var(--accent);font-size:1.3rem}
.kv{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--line);font-size:.9rem}
.kv:last-child{border-bottom:0}
.kv b{color:var(--ink)}
.vol-wrap{display:flex;align-items:center;gap:10px}
</style>

<script>
"use strict";
/* =============================================================
 * 0.  Persistence
 * ============================================================= */
const STORE_KEY = "fretwork.v1";
const DEFAULT_STATE = { completed:{}, progression:[], practice:{dates:{},streak:0,best:0}, settings:{ volume:0.8, bpm:80, sig:4 } };
function loadState(){
  try{ const r = JSON.parse(localStorage.getItem(STORE_KEY)); if(r&&typeof r==="object")
    return Object.assign({}, DEFAULT_STATE, r, {settings:Object.assign({},DEFAULT_STATE.settings,r.settings)});
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
let STATE = loadState();
let saveTimer=null;
function saveState(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(STATE)); }catch(e){} },120); }

// ---- Practice streak ----------------------------------------------------
function dateStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function markPractice(){
  if(!STATE.practice) STATE.practice={dates:{},streak:0,best:0};
  const t=dateStr(new Date());
  STATE.practice.dates[t]=1;
  let s=0, d=new Date();
  while(STATE.practice.dates[dateStr(d)]){ s++; d.setDate(d.getDate()-1); }
  STATE.practice.streak=s;
  STATE.practice.best=Math.max(STATE.practice.best||0, s);
  saveState();
}

/* =============================================================
 * 1.  Audio – note→frequency + Karplus-Strong pluck
 * ============================================================= */
const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
let actx = null, master = null;
function audio(){
  if(!actx){
    actx = new (window.AudioContext||window.webkitAudioContext)();
    master = actx.createGain();
    master.gain.value = STATE.settings.volume;
    master.connect(actx.destination);
  }
  if(actx.state==="suspended") actx.resume();
  return actx;
}
// Equal temperament, A4 = 440Hz. midi 69 = A4.
function midiToFreq(m){ return 440 * Math.pow(2,(m-69)/12); }
// note name + octave → midi.  e.g. noteMidi("E",2)=40
function noteMidi(name, octave){ return NOTE_NAMES.indexOf(name) + (octave+1)*12; }
function setVolume(v){ STATE.settings.volume=v; if(master) master.gain.value=v; saveState(); }

// Karplus-Strong: noise-filled delay line + damped averaging filter.
function pluck(freq, duration=1.4, when=0, vel=1){
  const ctx = audio();
  const sr  = ctx.sampleRate;
  const N   = Math.max(2, Math.round(sr/freq));
  const len = Math.floor(sr*duration);
  const buf = ctx.createBuffer(1, len, sr);
  const out = buf.getChannelData(0);
  const delay = new Float32Array(N);
  for(let i=0;i<N;i++) delay[i]=Math.random()*2-1;
  // string brightness/decay – longer strings ring longer
  const decay = 0.992 + Math.min(0.0069, freq/40000);
  let last=0;
  for(let i=0;i<len;i++){
    const idx=i%N;
    const cur=delay[idx];
    out[i]=cur;
    delay[idx]=decay*0.5*(cur+last);
    last=cur;
  }
  // gentle amplitude envelope (attack + tail) to avoid clicks
  const atk=Math.floor(sr*0.004), rel=Math.floor(sr*0.06);
  for(let i=0;i<atk;i++) out[i]*=i/atk;
  for(let i=0;i<rel;i++) out[len-1-i]*= i/rel;

  const src=ctx.createBufferSource(); src.buffer=buf;
  const g=ctx.createGain(); g.gain.value=0.9*vel;
  const tone=ctx.createBiquadFilter(); tone.type="lowpass"; tone.frequency.value=Math.min(6500,freq*8);
  src.connect(tone); tone.connect(g); g.connect(master);
  src.start(ctx.currentTime+when);
  return src;
}

/* =============================================================
 * 2.  Tuning + music helpers
 * ============================================================= */
// Standard tuning, low→high. Kept as a constant so it can change later.
const TUNING = [
  {name:"E", octave:2}, {name:"A", octave:2}, {name:"D", octave:3},
  {name:"G", octave:3}, {name:"B", octave:3}, {name:"E", octave:4}
];
const OPEN_MIDI = TUNING.map(t=>noteMidi(t.name,t.octave)); // [40,45,50,55,59,64]
function fretMidi(stringIdx, fret){ return OPEN_MIDI[stringIdx]+fret; }
function pcName(pc){ return NOTE_NAMES[((pc%12)+12)%12]; }
const INTERVAL_LABEL = {0:"R",1:"♭2",2:"2",3:"♭3",4:"3",5:"4",6:"♭5",7:"5",8:"♭6",9:"6",10:"♭7",11:"7"};

/* =============================================================
 * 3.  Fretboard SVG renderer (chords + scales)
 * ============================================================= */
// ---- Chord diagram (vertical) -------------------------------------------
function chordWindow(frets){
  const fretted = frets.filter(f=>typeof f==="number" && f>0);
  if(!fretted.length) return {start:1,count:4};
  const min=Math.min(...fretted), max=Math.max(...fretted);
  if(max<=4) return {start:1,count:4};
  return {start:min,count:Math.max(4,max-min+1)};
}
function renderChord(ch, opts={}){
  const big=!!opts.big, u=big?2.1:1, labels=big||opts.labels;
  const frets=ch.frets, fingers=ch.fingers||[];
  const win=chordWindow(frets);
  const nS=6, sGap=22*u, fGap=34*u;
  const mL=26*u, mT=42*u, mR=12*u, mB=(labels?22:8)*u;
  const boardW=(nS-1)*sGap, boardH=win.count*fGap;
  const W=mL+boardW+mR, H=mT+boardH+mB;
  const xS=i=>mL+i*sGap;
  const yF=row=>mT+row*fGap;
  const dotR=9.6*u, numFs=12*u, markFs=13*u;
  let s=`<svg class="diagram-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${ch.name} chord">`;
  // fret number label if not at the nut
  if(win.start>1) s+=`<text x="${mL-9*u}" y="${mT+fGap*0.7}" fill="var(--ink-dim)" font-size="${11*u}" text-anchor="end">${win.start}fr</text>`;
  // nut (thick) or top fret line
  const nut=win.start===1;
  s+=`<line x1="${xS(0)}" y1="${mT}" x2="${xS(nS-1)}" y2="${mT}" stroke="var(--ink-dim)" stroke-width="${(nut?5:1.5)*u}" stroke-linecap="round"/>`;
  for(let r=1;r<=win.count;r++) s+=`<line x1="${xS(0)}" y1="${yF(r)}" x2="${xS(nS-1)}" y2="${yF(r)}" stroke="var(--line)" stroke-width="${1.5*u}"/>`;
  for(let i=0;i<nS;i++) s+=`<line class="cstr" data-s="${i}" data-w="${(1+ (5-i)*0.18)*u}" x1="${xS(i)}" y1="${mT}" x2="${xS(i)}" y2="${yF(win.count)}" stroke="var(--line)" stroke-width="${(1+ (5-i)*0.18)*u}"/>`;
  // open / muted markers
  for(let i=0;i<nS;i++){
    const f=frets[i];
    const x=xS(i), y=mT-12*u;
    if(f==="x"||f==="X") s+=`<text x="${x}" y="${y+4*u}" fill="var(--ink-dim)" font-size="${markFs}" text-anchor="middle">✕</text>`;
    else if(f===0) s+=`<circle class="cdot" data-s="${i}" data-r="${5.5*u}" cx="${x}" cy="${y}" r="${5.5*u}" fill="none" stroke="var(--ink-dim)" stroke-width="${1.6*u}"/>`;
  }
  // barres
  const drawn=new Set();
  for(let fin=1;fin<=4;fin++){
    const idxs=[]; let fr=null, ok=true;
    for(let i=0;i<nS;i++){ if(fingers[i]===fin && typeof frets[i]==="number" && frets[i]>0){ if(fr===null)fr=frets[i]; else if(fr!==frets[i])ok=false; idxs.push(i);} }
    if(ok && idxs.length>=2 && fr!==null){
      const row=fr-win.start+1, y=yF(row)-fGap/2;
      const x1=xS(Math.min(...idxs)), x2=xS(Math.max(...idxs));
      s+=`<rect x="${x1-dotR}" y="${y-dotR}" width="${x2-x1+dotR*2}" height="${dotR*2}" rx="${dotR}" fill="var(--wood)"/>`;
      idxs.forEach(i=>drawn.add(i));
      s+=`<text x="${(x1+x2)/2}" y="${y+numFs*0.35}" fill="#fff" font-size="${numFs}" font-weight="800" text-anchor="middle">${fin}</text>`;
    }
  }
  // finger dots
  for(let i=0;i<nS;i++){
    const f=frets[i];
    if(typeof f==="number" && f>0 && !drawn.has(i)){
      const row=f-win.start+1, x=xS(i), y=yF(row)-fGap/2;
      s+=`<circle class="cdot" data-s="${i}" data-r="${dotR}" cx="${x}" cy="${y}" r="${dotR}" fill="var(--wood)" stroke="#fff" stroke-width="${1.2*u}"/>`;
      const fin=fingers[i];
      if(fin) s+=`<text x="${x}" y="${y+numFs*0.35}" fill="#fff" font-size="${numFs}" font-weight="800" text-anchor="middle">${fin}</text>`;
    }
  }
  // string name labels (low E … high E) under the board
  if(labels){
    const names=["E","A","D","G","B","E"];
    for(let i=0;i<nS;i++) s+=`<text x="${xS(i)}" y="${yF(win.count)+16*u}" fill="var(--ink-faint)" font-size="${10.5*u}" text-anchor="middle">${names[i]}</text>`;
  }
  s+=`</svg>`;
  return s;
}

// ---- Scale diagram (horizontal, full neck or windowed) ------------------
const MAX_FRET = 15;
const INLAYS = [3,5,7,9,12,15];
function renderScale(def, rootPc, opts={}){
  const showLabels = opts.labels;
  const win = opts.window; // {start,end} or null
  const fStart = win? Math.max(0,win.start) : 0;
  const fEnd   = win? Math.min(MAX_FRET,win.end) : MAX_FRET;
  const nS=6, sGap=26, fGap=38;
  const mL=30, mT=18, mR=16, mB=26;
  // draw one fret-space to the left of a box so its lowest notes sit inside a fret
  const drawStart = fStart>0 ? fStart-1 : 0;
  const nFret=fEnd-drawStart;
  const boardW=Math.max(1,nFret)*fGap, boardH=(nS-1)*sGap;
  const W=mL+boardW+mR, H=mT+boardH+mB;
  const xF=f=>mL+(f-drawStart)*fGap;          // x at fret wire f
  const yStr=s=>mT+(nS-1-s)*sGap;             // high E (s=5) on top
  const pcs = def.intervals.map(iv=>((rootPc+iv)%12));
  const dotR=12, rootFill="var(--root)", noteFill="var(--accent-2)";
  let s=`<svg class="diagram-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${def.name} scale">`;
  // string name labels (high E on top → low E bottom)
  const strNames=["E","A","D","G","B","E"];
  for(let i=0;i<nS;i++) s+=`<text class="scale-strlabel" x="8" y="${yStr(i)+4}">${strNames[i]}</text>`;
  // inlays
  INLAYS.forEach(f=>{ if(f>drawStart && f<=fEnd){ const x=xF(f)-fGap/2; const ys=(f===12||f===24)?[yStr(4),yStr(1)]:[ (yStr(2)+yStr(3))/2 ];
    ys.forEach(y=>{ s+=`<circle cx="${x}" cy="${y}" r="3" fill="var(--line)"/>`; }); }});
  // strings
  for(let i=0;i<nS;i++) s+=`<line x1="${mL}" y1="${yStr(i)}" x2="${mL+boardW}" y2="${yStr(i)}" stroke="var(--line)" stroke-width="${1+ i*0.18}"/>`;
  // fret wires
  for(let f=drawStart; f<=fEnd; f++){ const nut=f===0; s+=`<line x1="${xF(f)}" y1="${mT}" x2="${xF(f)}" y2="${mT+boardH}" stroke="${nut?'var(--ink-dim)':'var(--line)'}" stroke-width="${nut?4:1.4}"/>`; }
  // fret numbers (label the space behind each wire)
  for(let f=Math.max(1,drawStart+1); f<=fEnd; f++){ s+=`<text x="${xF(f)-fGap/2}" y="${mT+boardH+19}" fill="var(--ink-faint)" font-size="10" text-anchor="middle">${f}</text>`; }
  // notes
  for(let str=0; str<nS; str++){
    for(let f=fStart; f<=fEnd; f++){
      const pc=fretMidi(str,f)%12;
      const k=pcs.indexOf(pc);
      if(k<0) continue;
      if(opts.onlyKeys && !opts.onlyKeys.has(str+"_"+f)) continue;
      const iv=def.intervals[k];
      const isRoot=iv===0;
      const x = f===0 ? xF(0)-13 : xF(f)-fGap/2;
      const y = yStr(str);
      const fill=isRoot?rootFill:noteFill;
      s+=`<circle class="snote" data-k="${str}_${f}" data-r="${dotR}" data-fill="${fill}" cx="${x}" cy="${y}" r="${dotR}" fill="${fill}" stroke="#fff" stroke-width="1.4"/>`;
      const lab = showLabels? INTERVAL_LABEL[iv] : (isRoot? pcName(pc):"");
      if(lab) s+=`<text x="${x}" y="${y+3.6}" fill="#fff" font-size="10.5" font-weight="800" text-anchor="middle" pointer-events="none">${lab}</text>`;
    }
  }
  s+=`</svg>`;
  return s;
}

// ---- Playback -----------------------------------------------------------
function playChord(ch, container){
  audio();
  let t=0;
  const stagger=0.05; // slightly wider so the strum is visible as it lights up
  for(let i=0;i<6;i++){
    const f=ch.frets[i];
    if(f==="x"||f==="X") continue;
    pluck(midiToFreq(fretMidi(i, f===0?0:f)), 1.5, t, 0.95);
    if(container) flashString(container, i, t);
    t+=stagger; // downward strum stagger
  }
}
// light up a single string (line + its dot) as it is struck
function flashString(container, i, delaySec){
  const lines=container.querySelectorAll(`.cstr[data-s="${i}"]`);
  const dots =container.querySelectorAll(`.cdot[data-s="${i}"]`);
  setTimeout(()=>{
    lines.forEach(l=>{ l.setAttribute("stroke","var(--wood)"); l.setAttribute("stroke-width", (parseFloat(l.dataset.w)+2.4)); });
    dots.forEach(d=>{ d.setAttribute("r", +d.dataset.r+3); d.setAttribute("stroke","var(--wood-lite)"); });
    setTimeout(()=>{
      lines.forEach(l=>{ l.setAttribute("stroke","var(--line)"); l.setAttribute("stroke-width", l.dataset.w); });
      dots.forEach(d=>{ d.setAttribute("r", d.dataset.r); d.setAttribute("stroke", d.getAttribute("fill")==="none"?"var(--ink-dim)":"#fff"); });
    }, 190);
  }, delaySec*1000);
}
// gather the scale notes shown in a window, ascending and de-duplicated by pitch
function collectScaleNotes(def, rootPc, win){
  const fStart=win?Math.max(0,win.start):0, fEnd=win?Math.min(MAX_FRET,win.end):MAX_FRET;
  const pcs=def.intervals.map(iv=>(rootPc+iv)%12);
  const notes=[];
  for(let str=0;str<6;str++) for(let f=fStart;f<=fEnd;f++){
    const midi=fretMidi(str,f), pc=midi%12, k=pcs.indexOf(pc);
    if(k>=0) notes.push({str,f,midi});
  }
  notes.sort((a,b)=> a.midi-b.midi || a.str-b.str);
  const seen=new Set(), uniq=[];
  notes.forEach(n=>{ if(!seen.has(n.midi)){ seen.add(n.midi); uniq.push(n); } });
  return uniq;
}
let scaleTimers=[];
function clearScaleAnim(container){
  scaleTimers.forEach(clearTimeout); scaleTimers=[];
  if(container) container.querySelectorAll(".snote").forEach(c=>{ c.setAttribute("r",c.dataset.r); c.setAttribute("fill",c.dataset.fill); });
}
// play a scale within a container, lighting each note as it sounds
function playScaleInto(container, def, rootPc, win){
  audio();
  clearScaleAnim(container);
  const asc=collectScaleNotes(def,rootPc,win);
  if(!asc.length) return;
  const seq=[...asc, ...asc.slice(0,-1).reverse()];
  const step= win? 0.34 : 0.20;   // slower for a single box so it's followable
  seq.forEach((n,i)=> pluck(midiToFreq(n.midi),0.55,i*step,0.92));
  if(!container) return;
  const map={}; container.querySelectorAll(".snote").forEach(c=> map[c.dataset.k]=c);
  seq.forEach((n,i)=>{
    scaleTimers.push(setTimeout(()=>{
      container.querySelectorAll(".snote").forEach(c=>{ c.setAttribute("r",c.dataset.r); c.setAttribute("fill",c.dataset.fill); });
      const c=map[n.str+"_"+n.f];
      if(c){ c.setAttribute("r", +c.dataset.r+3); c.setAttribute("fill","var(--good)"); }
    }, i*step*1000));
  });
  scaleTimers.push(setTimeout(()=> clearScaleAnim(container), seq.length*step*1000+220));
}

 {stage:"Stage 1 · Beginner", title:"Before you play", lessons:[

     {p:"Sit in a chair without arms, feet flat on the floor, and rest the waist (the inward curve) of the body on your right thigh if you are right-handed. The guitar should sit roughly upright, not tipped back so you can see the strings – tipping it back wrecks your wrist angle and your view will improve with practice."},
     {p:"Keep your back fairly straight and let the guitar come to you rather than hunching over it. The neck should point slightly upward, never drooping toward the floor. Your strumming forearm rests on the upper edge of the body, and the guitar is held steady by a light contact between your forearm, chest and thigh – not by gripping with the fretting hand."},

     {p:"Press <b>just behind</b> the fret wire, not on top of it and not in the middle of the gap. Right behind the fret you get a clean note for the least effort; too far back and the note buzzes. The picking hand floats over the soundhole, moving from the wrist and elbow in a relaxed swing."},

 {stage:"Stage 2 · Songs & rhythm", title:"Adding E, A and Dm", lessons:[

 {stage:"Stage 2 · Songs & rhythm", title:"7th chords", lessons:[

 {stage:"Stage 2 · Songs & rhythm", title:"Conquering F", lessons:[
   {id:"m10l1", title:"Fmaj7 and the mini-F", blocks:[
     {p:"F is the chord that humbles every beginner, so we approach it in stages. <b>Fmaj7</b> needs no barre at all – it’s a four-string shape closely related to C, and it sounds gorgeous. The <b>mini-F</b> then asks your first finger to press the top two strings together at the 1st fret, a half-barre that builds toward the real thing."},
     {chords:["Fmaj7","F (mini)"]},
     {p:"Spend real time on these two. They’re not just stepping stones – they’re great chords in their own right that you’ll keep using long after you’ve conquered the full barre."}
   ]},
   {id:"m10l2", title:"The full barre F", blocks:[
     {p:"The full F lays your first finger flat across all six strings at the 1st fret while the rest of your hand forms an E-major shape on top. The key is your thumb: drop it low behind the neck and pull your elbow in slightly so the flat finger gets leverage. Press, then pick each string to find the dead ones, and adjust."},
     {chords:["F"]},
     {p:"Hand strength and a precise barre take a few weeks to develop, so don’t be discouraged by early buzzing. The pay-off is enormous: this one shape, moved up the neck, becomes <i>any</i> major chord – which is exactly where we’re heading next."}
   ]}
 ]},
 {stage:"Stage 3 · Intermediate", title:"Barre chords and movable shapes", lessons:[
   {id:"m11l1", title:"E-shape barre chords", blocks:[
     {p:"The full F you just learned is really an E-major shape with a barre behind it. Because nothing is played open, the <b>whole shape is movable</b>: slide it up so the barre sits at the 3rd fret and you have G; at the 5th fret, A. The root note is on the 6th string, so wherever your barre finger’s root lands names the chord. Make it minor by lifting the one finger that turns E into Em."},
     {chords:["F (E-shape)","Fm (E-shape)"]},
     {p:"Learning the note names along the 6th string therefore unlocks every major and minor chord from a single pair of shapes. That’s the great efficiency of barre chords."}
   ]},
   {id:"m11l2", title:"A-shape barre chords", blocks:[
     {p:"The second essential barre is built from the A-major shape, with the root on the <b>5th string</b>. Barre at the 1st fret for B♭, and slide it up the neck from there. Pairing the E-shape (root on the 6th string) with the A-shape (root on the 5th string) lets you play any chord in two convenient places on the neck."},
     {chords:["B♭ (A-shape)","B♭m (A-shape)"]}
   ]},
   {id:"m11l3", title:"Power chords", blocks:[
     {p:"A power chord is the bare minimum – just the root and the fifth, with no third, so it’s neither major nor minor. It uses two or three fingers, is endlessly movable, and is the engine of rock and punk rhythm guitar. Because the shape is so small and forgiving, it’s also a great way to get comfortable moving fixed shapes around the neck."},
     {p:"Try a root on the 6th string with the fifth two frets up on the 5th string, then shift that same shape to different frets. The portability you practised with barre chords applies here in an easier package."}
   ]}
 ]},
 {stage:"Stage 3 · Intermediate", title:"Scales and lead basics", lessons:[
   {id:"m12l1", title:"Minor pentatonic, box 1", blocks:[

     {scale:{key:"minpent",root:"A",labels:true,box:0}},
     {p:"Say the intervals as you go – root, ♭3, 4, 5, ♭7 – so you start to hear what each degree contributes rather than just memorising dots. The same shape works in any key; just slide it so the root lands on your chosen note."}
   ]},
   {id:"m12l2", title:"The blues scale", blocks:[
     {p:"Add one note – the ♭5, often called the ‘blue note’ – to the minor pentatonic and you have the blues scale. That single extra note, used as a quick passing tone rather than a place to linger, brings instant grit and tension. It’s the sound of nearly every blues and rock lead line."},
     {scale:{key:"blues",root:"A",labels:true,box:0}},
     {p:"Practise sliding into the ♭5 and straight off it again. Treated as a spice rather than a main ingredient, it transforms simple pentatonic runs."}
   ]},

     {scale:{key:"major",root:"G",labels:true}},
     {p:"To start improvising, put on a slow backing loop – say Am for the minor pentatonic, or a 12-bar blues in A – and noodle within one box. Aim for phrases with space and repetition rather than a constant stream of notes; leaving gaps is what makes a solo sound like music."},
     {tool:true}
   ]},
   {id:"m12l4", title:"Where to go next", blocks:[
     {p:"You now have a real foundation: clean open chords, barre and power chords, strumming in time, and your first scales. From here the path branches in several rewarding directions, and you can follow whichever pulls you."},
     {p:"<b>CAGED and more positions</b> connect the scale boxes into the whole neck. <b>Fingerstyle</b> opens up arpeggios and self-accompaniment. A little <b>music theory</b> – how keys, chords and scales relate – makes everything you’ve learned click into place. And above all, keep learning songs you love: they are the most motivating teacher of all."},
     {tip:"Short, regular practice wins. Fifteen focused minutes a day will take you further than a single long session once a week."}
   ]}
 ]}

const $ = sel=>document.querySelector(sel);
const el = (tag,cls,html)=>{ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; };

// ---- Getting started ----------------------------------------------------
function renderStart(){
  const v=$("#view-start");
  v.innerHTML="";
  v.appendChild(el("p","section-intro","Everything around playing – tuning, posture, technique and how to read the diagrams in this app."));

  // Tuning
  const tune=el("div","card");
  tune.innerHTML=`<h3>Tuning – reference tones</h3>
    <p class="hint">Standard tuning is E A D G B E, low to high. Tap a string to hear its true pitch, then match your guitar to it. Tune up to the note so it settles.</p>`;
  TUNING.forEach((t,i)=>{
    const b=el("button","stringbtn");
    b.innerHTML=`<span><span class="nm">${t.name}</span> <span class="oct">${t.name}${t.octave} · string ${6-i}</span></span><span class="play">▶</span>`;
    b.onclick=()=> pluck(midiToFreq(OPEN_MIDI[i]), 2.4, 0, 1);
    tune.appendChild(b);
  });
  tune.appendChild(el("div","note-banner","Relative tuning by ear: the 5th fret of one string matches the next open string up – except the G string, where the 4th fret gives B."));
  v.appendChild(tune);

  // Posture + technique quick refs
  const tech=el("div","card");
  tech.innerHTML=`<h3>Holding the guitar</h3>
    <p>Sit upright, the guitar’s waist on your thigh, neck angled slightly up. Balance it with your forearm and body so the fretting hand is free for the strings.</p>
    <h3>Fretting hand</h3>
    <p>Thumb behind the neck, press with arched fingertips just <b>behind</b> the fret for a clean note with the least effort.</p>
    <h3>Picking &amp; strumming</h3>
    <p>Hold the pick on the pad of your index finger with the thumb over it, a few millimetres showing. Strum from a loose wrist; keep the hand moving like a pendulum.</p>`;
  v.appendChild(tech);

  // Reading diagrams
  const read=el("div","card");
  read.innerHTML=`<h3>Reading the diagrams</h3>
    <p><b>Chord diagrams</b> are drawn vertically, as if the guitar is standing up facing you. Vertical lines are the strings – low E on the left, high E on the right. Horizontal lines are the frets, with the thick line at the top being the nut. Numbered dots show which finger presses where; <b>○</b> above a string means play it open, <b>✕</b> means don’t play it.</p>
    <div style="display:flex;gap:14px;align-items:flex-start;justify-content:center;margin:10px 0">
      <div style="flex:0 0 110px">${renderChord(CHORD_BY_NAME["C"])}<div class="hint" style="text-align:center">C major</div></div>
    </div>
    <p><b>Scale diagrams</b> are drawn horizontally along the whole neck. Each row is a string (high E on top), each column a fret. Coral dots are the root note; teal dots are the other scale notes. Labels can show finger-friendly intervals such as R, ♭3, 4, 5, ♭7.</p>
    <h3>Practice principles</h3>
    <p>Short daily sessions beat occasional long ones. Aim for clean notes before speed. Practise chord changes in short bursts with the metronome, counting your clean changes.</p>`;
  v.appendChild(read);
}

let currentChordFilter="all";
function renderChords(){
  const v=$("#view-chords");
  v.innerHTML="";
  v.appendChild(el("p","section-intro","Tap a chord for a big, zoomable view, ▶ to hear it, or ＋ to add it to a progression to practise."));

  // progression focus panel (built/refreshed by renderProgPanel)
  const panel=el("div","prog-panel"); panel.id="progPanel"; v.appendChild(panel);

  const groups=[...new Set(CHORDS.map(c=>c.group))];
  groups.forEach(g=>{
    v.appendChild(el("div","group-title",g));
    if(g==="Barre – movable")
      v.appendChild(el("div","tip","These shapes use no open strings, so the whole shape slides up the neck to make any major or minor chord. The shown chord is just one position – the root note names it."));
    const grid=el("div","grid");
    CHORDS.filter(c=>c.group===g).forEach(c=>{
      const chip=el("div","chip");
      chip.innerHTML=`<button class="chip-add" aria-label="Add ${c.name} to progression">＋</button><button class="chip-play" aria-label="Play ${c.name}">▶</button><div class="name">${c.name}</div>${renderChord(c)}<div class="sub">${c.sub||""}</div>`;
      chip.onclick=()=> openChordZoom(c);
      chip.querySelector(".chip-play").onclick=e=>{ e.stopPropagation(); playChord(c, chip); flash(chip); };
      chip.querySelector(".chip-add").onclick=e=>{ e.stopPropagation(); addToProgression(c.name); flash(chip); };
      grid.appendChild(chip);
    });
    v.appendChild(grid);
  });
  renderProgPanel();
}

/* ---- Progression builder ---------------------------------------------- */
let progState={ playing:false, idx:0, loop:true, beats:4, bpm:80, click:false, countIn:true, timer:null };
function progClicks(){ if(!progState.click) return; const ctx=audio(), bd=60/progState.bpm; for(let b=0;b<progState.beats;b++) metroClick(ctx.currentTime+b*bd, b===0); }
function progItems(){ return STATE.progression || (STATE.progression=[]); }
function addToProgression(name){ progItems().push(name); saveState(); renderProgPanel(); toast(name+" added"); }
function removeFromProg(i){ progItems().splice(i,1); if(progState.idx>=progItems().length) progState.idx=0; saveState(); renderProgPanel(); }
function clearProg(){ stopProg(); STATE.progression=[]; saveState(); renderProgPanel(); }
function loadPreset(arr){ stopProg(); STATE.progression=arr.slice(); saveState(); renderProgPanel(); }
function progStepMs(){ return (60/progState.bpm)*progState.beats*1000; }
function playProg(){
  const items=progItems(); if(!items.length) return;
  audio(); progState.playing=true; progState.idx=0; updateProgPlayBtn();
  if(progState.click && progState.countIn){          // one bar count-in
    const ctx=audio(), bd=60/progState.bpm;
    for(let b=0;b<progState.beats;b++) metroClick(ctx.currentTime+b*bd, b===0);
    progState.timer=setTimeout(stepProg, bd*progState.beats*1000);
  } else stepProg();
}
function stepProg(){
  if(!progState.playing) return;
  const items=progItems();
  if(progState.idx>=items.length){ if(progState.loop) progState.idx=0; else { stopProg(); return; } }
  const ch=CHORD_BY_NAME[items[progState.idx]];
  const card=document.querySelector(`#progPanel .prog-item[data-i="${progState.idx}"]`);
  if(ch) playChord(ch, card);
  progClicks();
  highlightProg(progState.idx);
  progState.idx++;
  progState.timer=setTimeout(stepProg, progStepMs());
}

function chordHowTo(c){

  for(let i=0;i<6;i++){
    const f=c.frets[i], fin=c.fingers&&c.fingers[i];
    if(f==="x"||f==="X") items.push(`<li><b>${strNames[i]}</b> – don’t play (✕)</li>`);
    else if(f===0) items.push(`<li><b>${strNames[i]}</b> – play open (○)</li>`);

const metro={ running:false, bpm:STATE.settings.bpm||80, sig:STATE.settings.sig||4, beat:0,
  nextTime:0, lookahead:25, ahead:0.12, timer:null, queue:[] };
function metroClick(time, accent){
  const ctx=audio();
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.frequency.value=accent?1500:900;
  g.gain.setValueAtTime(0.0001,time);
  g.gain.exponentialRampToValueAtTime(accent?0.6:0.4,time+0.001);
  g.gain.exponentialRampToValueAtTime(0.0001,time+0.06);
  o.connect(g); g.connect(master);
  o.start(time); o.stop(time+0.07);
}
function metroSchedule(){
  while(metro.nextTime < audio().currentTime + metro.ahead){
    const accent = metro.beat===0;
    metroClick(metro.nextTime, accent);
    metro.queue.push({beat:metro.beat, time:metro.nextTime});
    metro.nextTime += 60/metro.bpm;
    metro.beat = (metro.beat+1)%metro.sig;
  }
}
function metroLoop(){
  metroSchedule();
  metro.timer=setTimeout(metroLoop, metro.lookahead);
}
function metroStart(){
  audio();
  metro.running=true; metro.beat=0; metro.queue=[];
  metro.nextTime=audio().currentTime+0.06;
  metroLoop();
  requestAnimationFrame(metroDraw);
}
function metroStop(){ metro.running=false; clearTimeout(metro.timer);
  document.querySelectorAll("#view-tools .beat").forEach(b=>b.classList.remove("on")); }
function metroDraw(){
  if(!metro.running) return;
  const now=audio().currentTime;
  while(metro.queue.length && metro.queue[0].time<=now){
    const ev=metro.queue.shift();
    const beats=document.querySelectorAll("#view-tools .beat");
    beats.forEach(b=>b.classList.remove("on"));
    const cur=beats[ev.beat]; if(cur){ cur.classList.add("on"); setTimeout(()=>cur.classList.remove("on"),110); }
  }
  requestAnimationFrame(metroDraw);
}
function setBpm(b){ metro.bpm=Math.max(40,Math.min(240,Math.round(b))); STATE.settings.bpm=metro.bpm; saveState(); refreshMetroUI(); }
function refreshMetroUI(){ const d=$("#bpmVal"); if(d) d.textContent=metro.bpm; const sl=$("#bpmSlider"); if(sl) sl.value=metro.bpm; }
let taps=[];
function tapTempo(){
  const now=performance.now();
  taps=taps.filter(t=> now-t < 2500);
  taps.push(now);
  if(taps.length>=2){
    let sum=0; for(let i=1;i<taps.length;i++) sum+=taps[i]-taps[i-1];
    setBpm(60000/(sum/(taps.length-1)));
  }
}
/* ---- Drum grooves (synthesised, no audio files) ----------------------- */
function noiseBurst(t,dur,vol,hp){
  const ctx=audio(),sr=ctx.sampleRate,n=Math.max(1,Math.ceil(sr*dur));
  const buf=ctx.createBuffer(1,n,sr),d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
  const src=ctx.createBufferSource();src.buffer=buf;
  const g=ctx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  const f=ctx.createBiquadFilter();f.type="highpass";f.frequency.value=hp||3000;
  src.connect(f);f.connect(g);g.connect(master);src.start(t);src.stop(t+dur+0.02);
}
function dKick(t){ const ctx=audio(),o=ctx.createOscillator(),g=ctx.createGain();
  o.frequency.setValueAtTime(155,t);o.frequency.exponentialRampToValueAtTime(48,t+0.13);
  g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.17);
  o.connect(g);g.connect(master);o.start(t);o.stop(t+0.19); }
function dSnare(t){ noiseBurst(t,0.14,0.5,1800); const ctx=audio(),o=ctx.createOscillator(),g=ctx.createGain();
  o.type="triangle";o.frequency.value=190;g.gain.setValueAtTime(0.35,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
  o.connect(g);g.connect(master);o.start(t);o.stop(t+0.1); }
function dHat(t){ noiseBurst(t,0.035,0.2,8000); }
const GROOVES={
  rock:{name:"Rock",steps:16,k:[0,8],s:[4,12],h:[0,2,4,6,8,10,12,14]},
  folk:{name:"Folk",steps:16,k:[0,8,11],s:[4,12],h:[0,2,4,6,8,10,12,14]},
  pop:{name:"Pop",steps:16,k:[0,6,8,10],s:[4,12],h:[0,2,4,6,8,10,12,14]},
  waltz:{name:"Waltz",steps:12,k:[0],s:[4,8],h:[0,2,4,6,8,10]},
};
const drum={running:false,bpm:90,pat:"rock",step:0,nextTime:0,timer:null};
function drumStepDur(){ return (60/drum.bpm)/4; }
function drumSchedule(){
  const ctx=audio();
  while(drum.nextTime < ctx.currentTime+0.12){
    const g=GROOVES[drum.pat], st=drum.step % g.steps;
    if(g.k.includes(st)) dKick(drum.nextTime);
    if(g.s.includes(st)) dSnare(drum.nextTime);
    if(g.h.includes(st)) dHat(drum.nextTime);
    drum.nextTime+=drumStepDur(); drum.step++;
  }
}
function drumLoop(){ drumSchedule(); drum.timer=setTimeout(drumLoop,25); }
function drumStart(){ audio(); drum.running=true; drum.step=0; drum.nextTime=audio().currentTime+0.06; drumLoop(); }
function drumStop(){ drum.running=false; clearTimeout(drum.timer); }

function renderNoteSpot(sp){
  const nS=6,sGap=20,fGap=30,mL=26,mT=12,mB=18,frets=12;
  const boardW=frets*fGap,boardH=(nS-1)*sGap,W=mL+boardW+16,H=mT+boardH+mB;
  const xF=f=>mL+f*fGap, yS=s=>mT+(nS-1-s)*sGap;
  let s=`<svg class="diagram-svg" viewBox="0 0 ${W} ${H}">`;
  const names=["E","A","D","G","B","E"];
  for(let i=0;i<nS;i++) s+=`<text class="scale-strlabel" x="8" y="${yS(i)+4}">${names[i]}</text>`;
  [3,5,7,9,12].forEach(f=>{ s+=`<circle cx="${xF(f)-fGap/2}" cy="${(yS(2)+yS(3))/2}" r="2.6" fill="var(--line)"/>`; });
  for(let i=0;i<nS;i++) s+=`<line x1="${mL}" y1="${yS(i)}" x2="${mL+boardW}" y2="${yS(i)}" stroke="var(--line)" stroke-width="${1+i*0.16}"/>`;
  for(let f=0;f<=frets;f++) s+=`<line x1="${xF(f)}" y1="${mT}" x2="${xF(f)}" y2="${mT+boardH}" stroke="${f===0?'var(--ink-dim)':'var(--line)'}" stroke-width="${f===0?3:1.2}"/>`;
  for(let f=1;f<=frets;f++) s+=`<text x="${xF(f)-fGap/2}" y="${mT+boardH+13}" fill="var(--ink-faint)" font-size="9" text-anchor="middle">${f}</text>`;
  const x= sp.f===0? xF(0)-11 : xF(sp.f)-fGap/2, y=yS(sp.s);
  s+=`<circle cx="${x}" cy="${y}" r="10" fill="var(--wood)" stroke="#fff" stroke-width="1.6"/><text x="${x}" y="${y+4}" fill="#fff" font-size="13" font-weight="800" text-anchor="middle">?</text>`;
  return s+`</svg>`;
}

  $("#metroToggle").onclick=function(){ if(metro.running){ metroStop(); this.textContent="Start"; } else { metroStart(); this.textContent="Stop"; } };
  $("#tapBtn").onclick=tapTempo;

  groove.querySelectorAll("[data-groove]").forEach(b=> b.onclick=()=>{ drum.pat=b.dataset.groove; groove.querySelectorAll("[data-groove]").forEach(x=>x.classList.toggle("active",x.dataset.groove===drum.pat)); });
  groove.querySelector("#drumBpm").oninput=e=>{ drum.bpm=+e.target.value; groove.querySelector("#drumBpmLbl").textContent=drum.bpm+" BPM"; };
  groove.querySelector("#drumToggle").onclick=function(){ if(drum.running){ drumStop(); this.textContent="▶ Start"; } else { drumStart(); this.textContent="■ Stop"; } };

  renderNoteTrainer();
  renderEarTrainer();
}

// ---- Curriculum ---------------------------------------------------------
let openModules={};
function moduleProgress(mi){
  const mod=CURRICULUM[mi];
  const done=mod.lessons.filter(l=>STATE.completed[l.id]).length;
  return {done, total:mod.lessons.length, pct:Math.round(done/mod.lessons.length*100)};
}
function overallProgress(){
  const done=LESSON_INDEX.filter(l=>STATE.completed[l.id]).length;
  return {done, total:TOTAL_LESSONS, pct:Math.round(done/TOTAL_LESSONS*100)};
}
function renderLearn(){
  const v=$("#view-learn");
  v.innerHTML="";
  const op=overallProgress();
  const head=el("div","card");
  head.innerHTML=`<div class="row">
    <div class="ring wrap" style="--p:${op.pct};width:58px;height:58px;flex:0 0 58px"><span>${op.pct}%</span></div>
    <div><h3 style="margin:0">Your learning path</h3><div class="hint">${op.done} of ${op.total} lessons complete · three stages, twelve modules</div></div></div>`;
  v.appendChild(head);

  // practice streak
  const pr=STATE.practice||{streak:0,best:0};
  const streak=el("div","streak-card");
  const flames = pr.streak>0 ? "🔥" : "🌱";
  streak.innerHTML=`<div class="streak-big">${flames} <b>${pr.streak}</b> day${pr.streak===1?"":"s"}</div>
    <div class="streak-sub">${pr.streak>0?"You’ve practised today – keep it going!":"Open the app daily to build a streak"}${pr.best>1?` · best ${pr.best}`:""}</div>`;
  v.appendChild(streak);

  v.appendChild(el("p","hint","Lessons unlock in order, but jump ahead any time if you’re curious."));

  let lastStage=null;
  CURRICULUM.forEach((mod,mi)=>{
    if(mod.stage!==lastStage){ v.appendChild(el("div","group-title",mod.stage)); lastStage=mod.stage; }
    const mp=moduleProgress(mi);
    const wrap=el("div","module"+(openModules[mi]?" open":""));
    const head=el("button","module-head");
    head.innerHTML=`<div class="ring wrap" style="--p:${mp.pct}"><span>${mp.done}/${mp.total}</span></div>
      <div><div class="stage">Module ${mi+1}</div><div class="mtitle">${mod.title}</div></div>
      <div class="chev">▶</div>`;
    head.onclick=()=>{ openModules[mi]=!openModules[mi]; renderLearn(); };
    wrap.appendChild(head);
    const ll=el("div","lessons");
    mod.lessons.forEach((les,li)=>{
      const done=!!STATE.completed[les.id];
      const a=el("button","lesson-link"+(done?" done":""));
      a.innerHTML=`<span class="tick">✓</span><span class="lt">${les.title}</span><span class="arrow">›</span>`;
      a.onclick=()=> openLesson(mi,li);
      ll.appendChild(a);
    });
    wrap.appendChild(ll);
    v.appendChild(wrap);
  });
}

// ---- Lesson reader ------------------------------------------------------
let currentLesson=null;
function lessonBlocks(blocks){
  let h="";
  blocks.forEach(b=>{
    if(b.p) h+=`<p>${b.p}</p>`;
    else if(b.h) h+=`<h3>${b.h}</h3>`;
    else if(b.tip) h+=`<div class="tip">${b.tip}</div>`;
    else if(b.chords){
      h+=`<div class="inline-chords">`+ b.chords.map(n=>{
        const c=CHORD_BY_NAME[n]; if(!c) return "";
        return `<button class="chip" data-chord="${n}"><span class="zoomhint">⤢</span><div class="name">${c.name}</div>${renderChord(c)}</button>`;
      }).join("") + `</div><div class="hint" style="text-align:center;margin:-4px 0 14px">Tap a chord to enlarge and hear it</div>`;
    }
    else if(b.scale){
      const def=SCALES[b.scale.key], rootPc=rootToPc(b.scale.root);
      const win = (b.scale.box!=null)? scalePositions(def,rootPc)[b.scale.box] : null;
      const onlyKeys = win? null : new Set(collectScaleNotes(def,rootPc,null).map(n=> n.str+"_"+n.f));
      h+=`<div class="scale-scroll" data-scale='${JSON.stringify(b.scale)}'>${renderScale(def,rootPc,{labels:b.scale.labels,window:win,onlyKeys})}</div>
          <div class="hint" style="text-align:center;margin:6px 0 14px">${def.name} in ${b.scale.root} · tap to hear it</div>`;
    }
    else if(b.tool){
      h+=`<button class="btn ghost block" data-goto="tools" style="margin:4px 0 14px">Open the Tools →</button>`;
    }
  });
  return h;
}
function openLesson(mi,li){
  const mod=CURRICULUM[mi], les=mod.lessons[li];
  currentLesson={mi,li,id:les.id};
  const idx=LESSON_INDEX.findIndex(l=>l.id===les.id);
  const v=$("#lessonView");
  const done=!!STATE.completed[les.id];
  v.innerHTML=`
    <div class="lesson-top"><button class="back" id="lessonBack">‹ Learn</button>
      <div class="hint">Module ${mi+1} · ${mod.title}</div></div>
    <h2>${les.title}</h2>
    <div class="lesson-body">${lessonBlocks(les.blocks)}</div>
    <div class="lesson-complete">
      <button class="toggle${done?" on":""}" id="completeToggle">
        <span class="sw"></span><span><b>${done?"Completed":"Mark complete"}</b><br><span class="hint">Saved on this device</span></span>
      </button>
    </div>
    <div class="lesson-nav">
      <button class="btn ghost" id="prevLesson"${idx<=0?" disabled style=opacity:.4":""}>‹ Previous</button>
      <button class="btn" id="nextLesson"${idx>=TOTAL_LESSONS-1?" disabled style=opacity:.4":""}>Next ›</button>
    </div>`;
  // wire interactions
  v.querySelectorAll("[data-chord]").forEach(btn=> btn.onclick=()=> openChordZoom(CHORD_BY_NAME[btn.dataset.chord]));
  v.querySelectorAll("[data-scale]").forEach(node=> node.onclick=()=>{ const sc=JSON.parse(node.dataset.scale); const def=SCALES[sc.key], rootPc=rootToPc(sc.root); const win=(sc.box!=null)?scalePositions(def,rootPc)[sc.box]:null; playScaleInto(node,def,rootPc,win); });
  v.querySelectorAll("[data-goto]").forEach(btn=> btn.onclick=()=> switchTab(btn.dataset.goto));
  $("#lessonBack").onclick=()=> switchTab("learn");
  $("#completeToggle").onclick=()=>{ toggleComplete(les.id); openLesson(mi,li); };
  $("#prevLesson").onclick=()=>{ if(idx>0){ const t=LESSON_INDEX[idx-1]; openLesson(t.mi,t.li); } };
  $("#nextLesson").onclick=()=>{ if(idx<TOTAL_LESSONS-1){ const t=LESSON_INDEX[idx+1]; openLesson(t.mi,t.li); } };
  showLessonView();
  $("#main").scrollTop=0;
}
function toggleComplete(id){
  if(STATE.completed[id]) delete STATE.completed[id];
  else STATE.completed[id]=true;
  saveState();
  if(STATE.completed[id]) toast("Lesson complete ✓");
}

/* =============================================================
 * 8.  Navigation
 * ============================================================= */
const VIEW_IDS={start:"view-start",chords:"view-chords",scales:"view-scales",learn:"view-learn",tools:"view-tools"};
const RENDERERS={start:renderStart,chords:renderChords,scales:renderScales,learn:renderLearn,tools:renderTools};
let activeTab="start";
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  $("#"+VIEW_IDS[tab]).classList.add("active");
  document.querySelectorAll("#tabs button").forEach(b=> b.classList.toggle("active", b.dataset.tab===tab));
  RENDERERS[tab]();
  $("#main").scrollTop=0;
}
function showLessonView(){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  $("#lessonView").classList.add("active");
  document.querySelectorAll("#tabs button").forEach(b=> b.classList.toggle("active", b.dataset.tab==="learn"));
}
document.querySelectorAll("#tabs button").forEach(b=> b.onclick=()=> switchTab(b.dataset.tab));

/* =============================================================
 * 9.  Settings / export-import
 * ============================================================= */
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1800); }
function openSettings(){
  const op=overallProgress();
  $("#statDone").textContent=op.done;
  $("#statPct").textContent=op.pct+"%";
  $("#volSlider").value=Math.round(STATE.settings.volume*100);
  $("#settingsModal").classList.add("open");
}
$("#settingsBtn").onclick=openSettings;
$("#closeSettings").onclick=()=> $("#settingsModal").classList.remove("open");
$("#settingsModal").onclick=e=>{ if(e.target.id==="settingsModal") $("#settingsModal").classList.remove("open"); };
$("#chordModal").onclick=e=>{ if(e.target.id==="chordModal") $("#chordModal").classList.remove("open"); };
$("#volSlider").oninput=e=> setVolume(+e.target.value/100);
function exportJSON(){ return JSON.stringify(STATE,null,2); }
$("#copyBtn").onclick=async()=>{
  const txt=exportJSON();
  try{ await navigator.clipboard.writeText(txt); toast("Copied to clipboard"); }
  catch(e){ $("#ioText").value=txt; toast("Copy the text above"); }
};
$("#downloadBtn").onclick=()=>{
  const blob=new Blob([exportJSON()],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="fretwork-backup.json"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast("Backup downloaded");
};
function importFromText(txt){
  try{
    const data=JSON.parse(txt);
    if(!data||typeof data!=="object") throw 0;
    STATE=Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), data,
      {settings:Object.assign({},DEFAULT_STATE.settings,data.settings)});
    saveState();
    metro.bpm=STATE.settings.bpm; metro.sig=STATE.settings.sig;
    if(master) master.gain.value=STATE.settings.volume;
    toast("Progress restored");
    $("#settingsModal").classList.remove("open");
    switchTab(activeTab);
  }catch(e){ toast("That doesn’t look like a valid backup"); }
}
$("#restoreBtn").onclick=()=>{ const t=$("#ioText").value.trim(); if(t) importFromText(t); else toast("Paste a backup first"); };
$("#fileInput").onchange=e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=> importFromText(r.result); r.readAsText(f); };

/* =============================================================
 * 10.  PWA manifest (inline blob) + boot
 * ============================================================= */
(function installManifest(){
  const icon = "data:image/svg+xml,"+encodeURIComponent(
    `<svg xmlns='http://www.w3.org/2000/svg' width='192' height='192'><rect width='192' height='192' rx='38' fill='#ff3d6e'/><text x='96' y='132' font-size='118' text-anchor='middle' fill='#fff' font-family='sans-serif'>◗</text></svg>`);
  const manifest={
    name:"Fretwork – Guitar Reference", short_name:"Fretwork",
    display:"standalone", background_color:"#fef4f5", theme_color:"#fef4f5",
    start_url:".", scope:".",
    icons:[{src:icon,sizes:"192x192",type:"image/svg+xml",purpose:"any maskable"},
           {src:icon,sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
  const link=document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
  const fav=document.createElement("link"); fav.rel="apple-touch-icon"; fav.href=icon; document.head.appendChild(fav);
})();

// First gesture unlocks audio on iOS
function unlockOnce(){ audio(); window.removeEventListener("touchend",unlockOnce); window.removeEventListener("mousedown",unlockOnce); }
window.addEventListener("touchend",unlockOnce,{passive:true});
window.addEventListener("mousedown",unlockOnce);

// boot
markPractice();
switchTab("start");
</script>
